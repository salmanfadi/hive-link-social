<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Login - Decentra</title>
    <style>
      :root {
        color-scheme: light;
        --background: #f7f8fb;
        --surface: #ffffff;
        --surface-strong: #111217;
        --foreground: #191b23;
        --muted: #687083;
        --border: #dfe3ec;
        --primary: #6048d6;
        --primary-hover: #4f39bd;
        --danger: #b42318;
        --success: #067647;
        --focus: rgb(96 72 214 / 20%);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        background: var(--background);
        color: var(--foreground);
        font-family:
          Inter,
          ui-sans-serif,
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          sans-serif;
      }

      main {
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
      }

      .shell {
        width: min(100%, 960px);
        display: grid;
        grid-template-columns: minmax(0, 1fr) minmax(360px, 420px);
        overflow: hidden;
        border: 1px solid var(--border);
        border-radius: 14px;
        background: var(--surface);
        box-shadow: 0 24px 70px rgb(20 24 40 / 12%);
      }

      .panel {
        display: flex;
        min-height: 560px;
        flex-direction: column;
        justify-content: space-between;
        background: var(--surface-strong);
        color: #fff;
        padding: 34px;
      }

      .brand {
        display: inline-flex;
        align-items: center;
        gap: 12px;
        color: inherit;
        text-decoration: none;
        font-size: 20px;
        font-weight: 800;
      }

      .logo {
        width: 40px;
        height: 40px;
        border-radius: 9px;
      }

      .panel-copy {
        max-width: 460px;
      }

      .panel-copy p:first-child {
        margin: 0 0 12px;
        color: #b7bfd3;
        font-size: 13px;
        font-weight: 750;
        letter-spacing: 0.12em;
        text-transform: uppercase;
      }

      .panel-copy h1 {
        margin: 0;
        font-size: 42px;
        line-height: 1.08;
      }

      .panel-copy p:last-child {
        margin: 18px 0 0;
        color: #c8cfdd;
        font-size: 17px;
        line-height: 1.7;
      }

      .form-side {
        padding: 34px;
      }

      .mobile-brand {
        display: none;
        margin-bottom: 26px;
      }

      h2 {
        margin: 0;
        font-size: 32px;
        line-height: 1.15;
      }

      .lede {
        margin: 8px 0 0;
        color: var(--muted);
        line-height: 1.6;
      }

      form {
        margin-top: 28px;
        display: grid;
        gap: 18px;
      }

      label {
        display: block;
        margin-bottom: 8px;
        font-size: 14px;
        font-weight: 700;
      }

      input {
        width: 100%;
        height: 46px;
        border: 1px solid var(--border);
        border-radius: 8px;
        padding: 0 13px;
        background: #fff;
        color: var(--foreground);
        font: inherit;
      }

      input:focus {
        border-color: var(--primary);
        outline: 4px solid var(--focus);
      }

      input[aria-invalid="true"] {
        border-color: var(--danger);
      }

      .row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
      }

      button {
        width: 100%;
        height: 46px;
        border: 0;
        border-radius: 8px;
        background: var(--primary);
        color: #fff;
        cursor: pointer;
        font: inherit;
        font-weight: 800;
      }

      button:hover {
        background: var(--primary-hover);
      }

      button:disabled {
        cursor: wait;
        opacity: 0.68;
      }

      a {
        color: var(--primary);
        font-weight: 800;
      }

      .link-button {
        width: auto;
        height: auto;
        padding: 0;
        border: 0;
        background: transparent;
        color: var(--primary);
        font-size: 14px;
      }

      .message {
        display: none;
        margin-top: 20px;
        margin-bottom: 12px;
        border-radius: 8px;
        padding: 14px 16px;
        font-size: 15px;
        line-height: 1.5;
        font-weight: 500;
        border-left: 4px solid;
      }

      .message[data-visible="true"] {
        display: block;
        animation: slideDown 0.3s ease-out;
      }

      .message[data-kind="error"] {
        border-left-color: var(--danger);
        background: rgb(180 35 24 / 10%);
        color: var(--danger);
      }

      .message[data-kind="success"] {
        border-left-color: var(--success);
        background: rgb(6 118 71 / 10%);
        color: var(--success);
      }

      @keyframes slideDown {
        from {
          opacity: 0;
          transform: translateY(-8px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .footer {
        margin: 22px 0 0;
        color: var(--muted);
        text-align: center;
        font-size: 14px;
      }

      @media (max-width: 820px) {
        main {
          padding: 16px;
        }

        .shell {
          display: block;
        }

        .panel {
          display: none;
        }

        .mobile-brand {
          display: inline-flex;
          color: var(--foreground);
        }

        .form-side {
          padding: 28px;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <section class="shell" aria-labelledby="login-title">
        <aside class="panel">
          <a class="brand" href="/">
            <img class="logo" src="/favicon.svg" alt="" />
            <span>Decentra</span>
          </a>
          <div class="panel-copy">
            <p>Private entry</p>
            <h1>Welcome back to your network.</h1>
            <p>
              Sign in with email, then continue into the full Decentra app after the session is
              saved.
            </p>
          </div>
        </aside>

        <div class="form-side">
          <a class="brand mobile-brand" href="/">
            <img class="logo" src="/favicon.svg" alt="" />
            <span>Decentra</span>
          </a>
          <h2 id="login-title">Login</h2>
          <p class="lede">Use your email and password to continue.</p>

          <div id="message" class="message" role="alert" aria-live="polite"></div>

          <form id="login-form" autocomplete="on" novalidate method="post" action="javascript:void(0)">
            <div>
              <label for="email">Email address</label>
              <input
                id="email"
                name="email"
                type="email"
                placeholder="name@example.com"
                autocomplete="email"
                inputmode="email"
                required
              />
            </div>

            <div>
              <div class="row">
                <label for="password">Password</label>
                <button class="link-button" type="button" id="reset-button">Forgot?</button>
              </div>
              <input
                id="password"
                name="password"
                type="password"
                placeholder="Enter your password"
                autocomplete="current-password"
                minlength="6"
                required
              />
            </div>

            <button id="submit-button" type="submit">Login</button>
          </form>

          <p class="footer">Need an account? <a href="/signup.html">Sign up</a></p>
        </div>
      </section>
    </main>

    <script src="/runtime-env.js"></script>
    <script>
      const SUPABASE_URL = window.__DECENTRA_ENV__?.SUPABASE_URL;
      const SUPABASE_KEY = window.__DECENTRA_ENV__?.SUPABASE_PUBLISHABLE_KEY;
    </script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
      const sbClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY, {
        auth: {
          persistSession: true,
          autoRefreshToken: true,
          detectSessionInUrl: true,
        },
      });
      const form = document.getElementById("login-form");
      const message = document.getElementById("message");
      const submitButton = document.getElementById("submit-button");
      const resetButton = document.getElementById("reset-button");
      const emailInput = document.getElementById("email");
      const passwordInput = document.getElementById("password");
      const query = new URLSearchParams(window.location.search);

      if (query.get("email")) emailInput.value = query.get("email");
      if (query.get("verified") === "1") {
        showMessage("Email verified successfully. You can login now.", "success");
      }
      if (query.get("email") || query.get("verified")) {
        window.history.replaceState({}, "", "/login.html");
      }

      if (!SUPABASE_URL || !SUPABASE_KEY) {
        showMessage("Missing Supabase runtime config. Check runtime-env.js.");
        submitButton.disabled = true;
      }

      if ("serviceWorker" in navigator) {
        navigator.serviceWorker.getRegistrations().then((registrations) => {
          registrations.forEach((registration) => registration.unregister());
        });
      }
      if ("caches" in window) {
        window.caches.keys().then((keys) => keys.forEach((key) => window.caches.delete(key)));
      }

      function showMessage(text, kind = "error") {
        message.textContent = text;
        message.dataset.kind = kind;
        message.dataset.visible = text ? "true" : "false";
      }

      function clearInvalid() {
        emailInput.removeAttribute("aria-invalid");
        passwordInput.removeAttribute("aria-invalid");
      }

      function validateLogin() {
        clearInvalid();
        const email = emailInput.value.trim();
        const password = passwordInput.value;

        if (!email || !emailInput.validity.valid) {
          emailInput.setAttribute("aria-invalid", "true");
          showMessage("Enter a valid email address.");
          emailInput.focus();
          return null;
        }

        if (password.length < 6) {
          passwordInput.setAttribute("aria-invalid", "true");
          showMessage("Password must be at least 6 characters.");
          passwordInput.focus();
          return null;
        }

        return { email, password };
      }

      function normalizeAuthError(error) {
        const msg = String(error?.message || "Could not log in. Please try again.");
        const lower = msg.toLowerCase();

        console.error("[Auth Error]", error);

        if (lower.includes("email not confirmed") || lower.includes("email_not_confirmed")) {
          return "📧 This account needs email verification. Check your inbox for the verification link, click it, then login here.";
        }
        if (lower.includes("invalid login credentials") || lower.includes("invalid_credentials")) {
          return "❌ Invalid email or password. Double-check your credentials and try again.";
        }
        if (lower.includes("user not found")) {
          return "👤 No account found with this email. Try signing up instead.";
        }
        if (lower.includes("too many") || lower.includes("rate limit")) {
          return "⏸️ Too many login attempts. Please wait a few minutes and try again.";
        }
        
        return msg;
      }

      async function ensureSessionPersisted(session) {
        console.log("[Session] Checking if session is persisted...");
        
        // First check if already in auth state
        const { data: check } = await sbClient.auth.getSession();
        if (check?.session) {
          console.log("[Session] ✓ Session already persisted in auth state");
          return check.session;
        }
        
        // If not, try to set it manually
        if (session?.access_token && session?.refresh_token) {
          console.log("[Session] Setting session with access/refresh tokens...");
          const { data, error } = await sbClient.auth.setSession({
            access_token: session.access_token,
            refresh_token: session.refresh_token,
          });
          if (error) {
            console.error("[Session] Error setting session:", error);
            throw error;
          }
          
          console.log("[Session] ✓ Session set successfully");
          
          // Wait a bit for localStorage to sync
          await new Promise(resolve => setTimeout(resolve, 500));
          
          // Verify it's actually in localStorage
          const storageKey = `sb-${new URL(SUPABASE_URL).hostname.split('.')[0]}-auth-token`;
          const stored = localStorage.getItem(storageKey);
          console.log("[Session] localStorage check:", stored ? "✓ Present" : "✗ Missing");
          
          // Do one more check
          const { data: finalCheck } = await sbClient.auth.getSession();
          if (finalCheck?.session) {
            console.log("[Session] ✓ Final check: Session confirmed");
            return finalCheck.session;
          } else {
            console.warn("[Session] ⚠ Session not found after setting");
            return data?.session || null;
          }
        }
        
        console.error("[Session] ✗ No tokens available to persist");
        return null;
      }

      form.addEventListener("submit", async (event) => {
        event.preventDefault();
        showMessage("");

        const values = validateLogin();
        if (!values) return;

        submitButton.disabled = true;
        submitButton.textContent = "Signing in...";
        console.log(`[Login] Attempting login for: ${values.email}`);

        try {
          const { data, error } = await sbClient.auth.signInWithPassword({
            email: values.email,
            password: values.password,
          });

          if (error) {
            console.error("[Login Error]", error);
            throw error;
          }
          
          console.log("[Login] Sign-in successful, session exists:", !!data.session);
          
          if (!data.session) {
            throw new Error("Login succeeded but no session was created. Please retry.");
          }

          submitButton.textContent = "Persisting session...";
          
          const persisted = await ensureSessionPersisted(data.session);
          if (!persisted) {
            throw new Error("Session could not be persisted in browser storage.");
          }

          console.log("[Login] Session persisted, waiting before redirect...");
          submitButton.textContent = "Redirecting...";
          
          // Wait extra time to ensure everything is synced
          await new Promise(resolve => setTimeout(resolve, 1500));
          
          // Verify one more time that session exists before redirecting
          const { data: finalCheck } = await sbClient.auth.getSession();
          if (finalCheck?.session) {
            console.log("[Login] ✓ Final verification: Session confirmed, redirecting to home");
            console.log("[Login] Session user:", finalCheck.session.user.email);
            // Use replace instead of href to prevent back button issues
            window.location.replace("/");
          } else {
            console.warn("[Login] ⚠ Session not found before redirect, but attempting anyway");
            window.location.replace("/");
          }
        } catch (error) {
          console.error("[Login] Caught error:", error);
          showMessage(normalizeAuthError(error));
        } finally {
          submitButton.disabled = false;
          submitButton.textContent = "Login";
        }
      });

      resetButton.addEventListener("click", async () => {
        clearInvalid();
        const email = emailInput.value.trim();

        if (!email || !emailInput.validity.valid) {
          emailInput.setAttribute("aria-invalid", "true");
          showMessage("Enter a valid email address first.");
          emailInput.focus();
          return;
        }

        resetButton.disabled = true;
        try {
          const { error } = await sbClient.auth.resetPasswordForEmail(email, {
            redirectTo: `${window.location.origin}/reset-password`,
          });
          if (error) throw error;
          showMessage("Check your inbox for the reset link.", "success");
        } catch (error) {
          showMessage(error.message || "Could not send a reset link.");
        } finally {
          resetButton.disabled = false;
        }
      });
    </script>
  </body>
</html>
