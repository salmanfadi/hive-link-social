<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Login - Decentra</title>
    <style>
      :root {
        color-scheme: light;
        --background: #f7f8fb;
        --surface: #ffffff;
        --surface-strong: #111217;
        --foreground: #191b23;
        --muted: #687083;
        --border: #dfe3ec;
        --primary: #6048d6;
        --primary-hover: #4f39bd;
        --danger: #b42318;
        --success: #067647;
        --focus: rgb(96 72 214 / 20%);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        background: var(--background);
        color: var(--foreground);
        font-family:
          Inter,
          ui-sans-serif,
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          sans-serif;
      }

      main {
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
      }

      .shell {
        width: min(100%, 960px);
        display: grid;
        grid-template-columns: minmax(0, 1fr) minmax(360px, 420px);
        overflow: hidden;
        border: 1px solid var(--border);
        border-radius: 14px;
        background: var(--surface);
        box-shadow: 0 24px 70px rgb(20 24 40 / 12%);
      }

      .panel {
        display: flex;
        min-height: 560px;
        flex-direction: column;
        justify-content: space-between;
        background: var(--surface-strong);
        color: #fff;
        padding: 34px;
      }

      .brand {
        display: inline-flex;
        align-items: center;
        gap: 12px;
        color: inherit;
        text-decoration: none;
        font-size: 20px;
        font-weight: 800;
      }

      .logo {
        width: 40px;
        height: 40px;
        border-radius: 9px;
      }

      .panel-copy {
        max-width: 460px;
      }

      .panel-copy p:first-child {
        margin: 0 0 12px;
        color: #b7bfd3;
        font-size: 13px;
        font-weight: 750;
        letter-spacing: 0.12em;
        text-transform: uppercase;
      }

      .panel-copy h1 {
        margin: 0;
        font-size: 42px;
        line-height: 1.08;
      }

      .panel-copy p:last-child {
        margin: 18px 0 0;
        color: #c8cfdd;
        font-size: 17px;
        line-height: 1.7;
      }

      .form-side {
        padding: 34px;
      }

      .mobile-brand {
        display: none;
        margin-bottom: 26px;
      }

      h2 {
        margin: 0;
        font-size: 32px;
        line-height: 1.15;
      }

      .lede {
        margin: 8px 0 0;
        color: var(--muted);
        line-height: 1.6;
      }

      form {
        margin-top: 28px;
        display: grid;
        gap: 18px;
      }

      label {
        display: block;
        margin-bottom: 8px;
        font-size: 14px;
        font-weight: 700;
      }

      input {
        width: 100%;
        height: 46px;
        border: 1px solid var(--border);
        border-radius: 8px;
        padding: 0 13px;
        background: #fff;
        color: var(--foreground);
        font: inherit;
      }

      input:focus {
        border-color: var(--primary);
        outline: 4px solid var(--focus);
      }

      input[aria-invalid="true"] {
        border-color: var(--danger);
      }

      .row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
      }

      button {
        width: 100%;
        height: 46px;
        border: 0;
        border-radius: 8px;
        background: var(--primary);
        color: #fff;
        cursor: pointer;
        font: inherit;
        font-weight: 800;
      }

      button:hover {
        background: var(--primary-hover);
      }

      button:disabled {
        cursor: wait;
        opacity: 0.68;
      }

      a {
        color: var(--primary);
        font-weight: 800;
      }

      .link-button {
        width: auto;
        height: auto;
        padding: 0;
        border: 0;
        background: transparent;
        color: var(--primary);
        font-size: 14px;
      }

      .message {
        display: none;
        margin-top: 20px;
        border-radius: 8px;
        padding: 11px 12px;
        font-size: 14px;
        line-height: 1.45;
      }

      .message[data-visible="true"] {
        display: block;
      }

      .message[data-kind="error"] {
        border: 1px solid rgb(180 35 24 / 28%);
        background: rgb(180 35 24 / 8%);
        color: var(--danger);
      }

      .message[data-kind="success"] {
        border: 1px solid rgb(6 118 71 / 28%);
        background: rgb(6 118 71 / 8%);
        color: var(--success);
      }

      .footer {
        margin: 22px 0 0;
        color: var(--muted);
        text-align: center;
        font-size: 14px;
      }

      @media (max-width: 820px) {
        main {
          padding: 16px;
        }

        .shell {
          display: block;
        }

        .panel {
          display: none;
        }

        .mobile-brand {
          display: inline-flex;
          color: var(--foreground);
        }

        .form-side {
          padding: 28px;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <section class="shell" aria-labelledby="login-title">
        <aside class="panel">
          <a class="brand" href="/">
            <img class="logo" src="/favicon.svg" alt="" />
            <span>Decentra</span>
          </a>
          <div class="panel-copy">
            <p>Private entry</p>
            <h1>Welcome back to your network.</h1>
            <p>
              Sign in with email, then continue into the full Decentra app after the session is
              saved.
            </p>
          </div>
        </aside>

        <div class="form-side">
          <a class="brand mobile-brand" href="/">
            <img class="logo" src="/favicon.svg" alt="" />
            <span>Decentra</span>
          </a>
          <h2 id="login-title">Login</h2>
          <p class="lede">Use your email and password to continue.</p>

          <div id="message" class="message" role="alert" aria-live="polite"></div>

          <form id="login-form" autocomplete="on" novalidate>
            <div>
              <label for="email">Email address</label>
              <input
                id="email"
                name="email"
                type="email"
                placeholder="name@example.com"
                autocomplete="email"
                inputmode="email"
                required
              />
            </div>

            <div>
              <div class="row">
                <label for="password">Password</label>
                <button class="link-button" type="button" id="reset-button">Forgot?</button>
              </div>
              <input
                id="password"
                name="password"
                type="password"
                placeholder="Enter your password"
                autocomplete="current-password"
                minlength="6"
                required
              />
            </div>

            <button id="submit-button" type="submit">Login</button>
          </form>

          <p class="footer">Need an account? <a href="/signup.html">Sign up</a></p>
        </div>
      </section>
    </main>

    <script>
      const SUPABASE_URL = "https://amgeagtqfvlzxckptkfq.supabase.co";
      const SUPABASE_KEY =
        "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJIUzI1NiIsInJlZiI6ImFtZ2VhZ3RxZnZsenhja3B0a2ZxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzgwOTY1MzIsImV4cCI6MjA5MzY3MjUzMn0.PMZ0DnYTr-njkenAkZUhVAO-jxQmCDLwe2ULw56m_8g";
    </script>
    <script>
      const AUTH_REF = "amgeagtqfvlzxckptkfq";
      const STORAGE_KEY = `sb-${AUTH_REF}-auth-token`;
      const form = document.getElementById("login-form");
      const message = document.getElementById("message");
      const submitButton = document.getElementById("submit-button");
      const resetButton = document.getElementById("reset-button");
      const emailInput = document.getElementById("email");
      const passwordInput = document.getElementById("password");

      if ("serviceWorker" in navigator) {
        navigator.serviceWorker.getRegistrations().then((registrations) => {
          registrations.forEach((registration) => registration.unregister());
        });
      }
      if ("caches" in window) {
        window.caches.keys().then((keys) => keys.forEach((key) => window.caches.delete(key)));
      }

      function showMessage(text, kind = "error") {
        message.textContent = text;
        message.dataset.kind = kind;
        message.dataset.visible = text ? "true" : "false";
      }

      function clearInvalid() {
        emailInput.removeAttribute("aria-invalid");
        passwordInput.removeAttribute("aria-invalid");
      }

      function validateLogin() {
        clearInvalid();
        const email = emailInput.value.trim();
        const password = passwordInput.value;

        if (!email || !emailInput.validity.valid) {
          emailInput.setAttribute("aria-invalid", "true");
          showMessage("Enter a valid email address.");
          emailInput.focus();
          return null;
        }

        if (password.length < 6) {
          passwordInput.setAttribute("aria-invalid", "true");
          showMessage("Password must be at least 6 characters.");
          passwordInput.focus();
          return null;
        }

        return { email, password };
      }

      function normalizeSession(session) {
        if (!session || !session.access_token || !session.refresh_token || !session.user) {
          throw new Error("Supabase did not return a complete session.");
        }

        return {
          ...session,
          expires_at:
            session.expires_at ||
            Math.floor(Date.now() / 1000) + Number(session.expires_in || 3600),
          token_type: session.token_type || "bearer",
        };
      }

      function saveSession(session) {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(normalizeSession(session)));
      }

      form.addEventListener("submit", async (event) => {
        event.preventDefault();
        showMessage("");

        const values = validateLogin();
        if (!values) return;

        submitButton.disabled = true;
        submitButton.textContent = "Signing in...";

        try {
          const response = await fetch(`${SUPABASE_URL}/auth/v1/token?grant_type=password`, {
            method: "POST",
            headers: {
              apikey: SUPABASE_KEY,
              Authorization: `Bearer ${SUPABASE_KEY}`,
              "Content-Type": "application/json",
            },
            body: JSON.stringify(values),
          });
          const data = await response.json();
          if (!response.ok) throw new Error(data.msg || data.message || data.error_description);
          saveSession(data);
          window.location.assign("/");
        } catch (error) {
          showMessage(error.message || "Could not log in. Please try again.");
        } finally {
          submitButton.disabled = false;
          submitButton.textContent = "Login";
        }
      });

      resetButton.addEventListener("click", async () => {
        clearInvalid();
        const email = emailInput.value.trim();

        if (!email || !emailInput.validity.valid) {
          emailInput.setAttribute("aria-invalid", "true");
          showMessage("Enter a valid email address first.");
          emailInput.focus();
          return;
        }

        resetButton.disabled = true;
        try {
          const response = await fetch(`${SUPABASE_URL}/auth/v1/recover`, {
            method: "POST",
            headers: {
              apikey: SUPABASE_KEY,
              Authorization: `Bearer ${SUPABASE_KEY}`,
              "Content-Type": "application/json",
            },
            body: JSON.stringify({
              email,
              redirect_to: `${window.location.origin}/reset-password`,
            }),
          });
          const data = await response.json().catch(() => ({}));
          if (!response.ok) throw new Error(data.msg || data.message || data.error_description);
          showMessage("Check your inbox for the reset link.", "success");
        } catch (error) {
          showMessage(error.message || "Could not send a reset link.");
        } finally {
          resetButton.disabled = false;
        }
      });
    </script>
  </body>
</html>
