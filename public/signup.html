<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
    <title>Sign up - Decentra</title>
    <style>
      :root {
        color-scheme: light;
        --background: #f7f8fb;
        --surface: #ffffff;
        --surface-strong: #111217;
        --foreground: #191b23;
        --muted: #687083;
        --border: #dfe3ec;
        --primary: #6048d6;
        --primary-hover: #4f39bd;
        --danger: #b42318;
        --success: #067647;
        --focus: rgb(96 72 214 / 20%);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        background: var(--background);
        color: var(--foreground);
        font-family:
          Inter,
          ui-sans-serif,
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          sans-serif;
      }

      main {
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
      }

      .shell {
        width: min(100%, 960px);
        display: grid;
        grid-template-columns: minmax(0, 1fr) minmax(360px, 420px);
        overflow: hidden;
        border: 1px solid var(--border);
        border-radius: 14px;
        background: var(--surface);
        box-shadow: 0 24px 70px rgb(20 24 40 / 12%);
      }

      .panel {
        display: flex;
        min-height: 620px;
        flex-direction: column;
        justify-content: space-between;
        background: var(--surface-strong);
        color: #fff;
        padding: 34px;
      }

      .brand {
        display: inline-flex;
        align-items: center;
        gap: 12px;
        color: inherit;
        text-decoration: none;
        font-size: 20px;
        font-weight: 800;
      }

      .logo {
        width: 40px;
        height: 40px;
        border-radius: 9px;
      }

      .panel-copy {
        max-width: 460px;
      }

      .panel-copy p:first-child {
        margin: 0 0 12px;
        color: #b7bfd3;
        font-size: 13px;
        font-weight: 750;
        letter-spacing: 0.12em;
        text-transform: uppercase;
      }

      .panel-copy h1 {
        margin: 0;
        font-size: 42px;
        line-height: 1.08;
      }

      .panel-copy p:last-child {
        margin: 18px 0 0;
        color: #c8cfdd;
        font-size: 17px;
        line-height: 1.7;
      }

      .form-side {
        padding: 34px;
      }

      .mobile-brand {
        display: none;
        margin-bottom: 26px;
      }

      h2 {
        margin: 0;
        font-size: 32px;
        line-height: 1.15;
      }

      .lede {
        margin: 8px 0 0;
        color: var(--muted);
        line-height: 1.6;
      }

      form {
        margin-top: 28px;
        display: grid;
        gap: 18px;
      }

      label {
        display: block;
        margin-bottom: 8px;
        font-size: 14px;
        font-weight: 700;
      }

      input {
        width: 100%;
        height: 46px;
        border: 1px solid var(--border);
        border-radius: 8px;
        padding: 0 13px;
        background: #fff;
        color: var(--foreground);
        font: inherit;
      }

      input:focus {
        border-color: var(--primary);
        outline: 4px solid var(--focus);
      }

      input[aria-invalid="true"] {
        border-color: var(--danger);
      }

      button {
        width: 100%;
        height: 46px;
        border: 0;
        border-radius: 8px;
        background: var(--primary);
        color: #fff;
        cursor: pointer;
        font: inherit;
        font-weight: 800;
      }

      button:hover {
        background: var(--primary-hover);
      }

      button:disabled {
        cursor: wait;
        opacity: 0.68;
      }

      a {
        color: var(--primary);
        font-weight: 800;
      }

      .message {
        display: none;
        margin-top: 20px;
        margin-bottom: 12px;
        border-radius: 8px;
        padding: 14px 16px;
        font-size: 15px;
        line-height: 1.5;
        font-weight: 500;
        border-left: 4px solid;
      }

      .message[data-visible="true"] {
        display: block;
        animation: slideDown 0.3s ease-out;
      }

      .message[data-kind="error"] {
        border-left-color: var(--danger);
        background: rgb(180 35 24 / 10%);
        color: var(--danger);
      }

      .message[data-kind="success"] {
        border-left-color: var(--success);
        background: rgb(6 118 71 / 10%);
        color: var(--success);
      }

      @keyframes slideDown {
        from {
          opacity: 0;
          transform: translateY(-8px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .footer {
        margin: 22px 0 0;
        color: var(--muted);
        text-align: center;
        font-size: 14px;
      }

      @media (max-width: 820px) {
        main {
          padding: 16px;
        }

        .shell {
          display: block;
        }

        .panel {
          display: none;
        }

        .mobile-brand {
          display: inline-flex;
          color: var(--foreground);
        }

        .form-side {
          padding: 28px;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <section class="shell" aria-labelledby="signup-title">
        <aside class="panel">
          <a class="brand" href="/">
            <img class="logo" src="/favicon.svg" alt="" />
            <span>Decentra</span>
          </a>
          <div class="panel-copy">
            <p>New account</p>
            <h1>Create your place in the network.</h1>
            <p>Set up email auth here, then enter the full app after Supabase returns a session.</p>
          </div>
        </aside>

        <div class="form-side">
          <a class="brand mobile-brand" href="/">
            <img class="logo" src="/favicon.svg" alt="" />
            <span>Decentra</span>
          </a>
          <h2 id="signup-title">Sign up</h2>
          <p class="lede">Create your account with Supabase email auth.</p>

          <div id="message" class="message" role="alert" aria-live="polite"></div>

          <form id="signup-form" autocomplete="on" novalidate method="post" action="javascript:void(0)">
            <div>
              <label for="username">Username</label>
              <input
                id="username"
                name="username"
                placeholder="decentra_user"
                autocomplete="username"
                minlength="2"
                maxlength="24"
                required
              />
            </div>

            <div>
              <label for="email">Email address</label>
              <input
                id="email"
                name="email"
                type="email"
                placeholder="name@example.com"
                autocomplete="email"
                inputmode="email"
                required
              />
            </div>

            <div>
              <label for="password">Password</label>
              <input
                id="password"
                name="password"
                type="password"
                placeholder="Create a password"
                autocomplete="new-password"
                minlength="6"
                required
              />
            </div>

            <button id="submit-button" type="submit">Create account</button>
          </form>

          <p class="footer">Already have an account? <a href="/login.html">Login</a></p>
        </div>
      </section>
    </main>

    <script src="/runtime-env.js"></script>
    <script>
      const SUPABASE_URL = window.__DECENTRA_ENV__?.SUPABASE_URL;
      const SUPABASE_KEY = window.__DECENTRA_ENV__?.SUPABASE_PUBLISHABLE_KEY;
    </script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
      const sbClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY, {
        auth: {
          persistSession: true,
          autoRefreshToken: true,
          detectSessionInUrl: true,
        },
      });
      const form = document.getElementById("signup-form");
      const message = document.getElementById("message");
      const submitButton = document.getElementById("submit-button");
      const usernameInput = document.getElementById("username");
      const emailInput = document.getElementById("email");
      const passwordInput = document.getElementById("password");

      if (!SUPABASE_URL || !SUPABASE_KEY) {
        showMessage("Missing Supabase runtime config. Check runtime-env.js.");
        submitButton.disabled = true;
      }

      sbClient.auth.getSession().then(({ data }) => {
        if (data?.session) window.location.replace("/");
      }).catch((e) => {
        console.warn("[Signup] Session pre-check failed", e);
      });

      if ("serviceWorker" in navigator) {
        navigator.serviceWorker.getRegistrations().then((registrations) => {
          registrations.forEach((registration) => registration.unregister());
        });
      }
      if ("caches" in window) {
        window.caches.keys().then((keys) => keys.forEach((key) => window.caches.delete(key)));
      }

      function showMessage(text, kind = "error") {
        message.textContent = text;
        message.dataset.kind = kind;
        message.dataset.visible = text ? "true" : "false";
      }

      function clearInvalid() {
        usernameInput.removeAttribute("aria-invalid");
        emailInput.removeAttribute("aria-invalid");
        passwordInput.removeAttribute("aria-invalid");
      }

      function validateSignup() {
        clearInvalid();
        const username = usernameInput.value.trim();
        const email = emailInput.value.trim();
        const password = passwordInput.value;

        if (!/^[A-Za-z0-9_]{2,24}$/.test(username)) {
          usernameInput.setAttribute("aria-invalid", "true");
          showMessage("Username must be 2-24 characters: letters, numbers, and underscores only.");
          usernameInput.focus();
          return null;
        }

        if (!email || !emailInput.validity.valid) {
          emailInput.setAttribute("aria-invalid", "true");
          showMessage("Enter a valid email address.");
          emailInput.focus();
          return null;
        }

        if (password.length < 6) {
          passwordInput.setAttribute("aria-invalid", "true");
          showMessage("Password must be at least 6 characters.");
          passwordInput.focus();
          return null;
        }

        return { username, email, password };
      }

      form.addEventListener("submit", async (event) => {
        event.preventDefault();
        showMessage("");

        const values = validateSignup();
        if (!values) return;

        submitButton.disabled = true;
        submitButton.textContent = "Creating account...";
        console.log(`[Signup] Attempting to create account for: ${values.email}`);

        try {
          const { data, error } = await sbClient.auth.signUp({
            email: values.email,
            password: values.password,
            options: {
              emailRedirectTo: `${window.location.origin}/verify.html`,
              data: {
                username: values.username,
                display_name: values.username,
              },
            },
          });
          
          if (error) {
            console.error("[Signup Error]", error);
            throw error;
          }

          console.log("[Signup] Success, session exists:", !!data.session);
          
          if (data.session) {
            console.log("[Signup] Logged in immediately, redirecting home");
            window.location.replace("/");
          } else {
            console.log("[Signup] Account created, awaiting email confirmation");
            showMessage(
              "Account created! Check your email for the verification link. If you don't see it, check your spam folder.",
              "success",
            );
          }
        } catch (error) {
          const errorMsg = String(error?.message || "Could not create your account. Please try again.");
          const lower = errorMsg.toLowerCase();
          
          let displayMsg = errorMsg;
          if (lower.includes("429") || lower.includes("too many requests") || lower.includes("rate limit")) {
            displayMsg = "⏸️ Too many signup attempts. Please wait 1 hour before trying again with this email, or use a different email address.";
          } else if (lower.includes("user already exists")) {
            displayMsg = "👤 This email is already registered. Try logging in instead, or use a different email.";
          } else if (lower.includes("invalid email")) {
            displayMsg = "📧 Invalid email format. Please check your email address.";
          }
          
          console.error("[Signup Error]", error);
          showMessage(displayMsg);
        } finally {
          submitButton.disabled = false;
          submitButton.textContent = "Create account";
        }
      });
    </script>
  </body>
</html>
